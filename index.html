<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Highlander Duelists</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="src/favicon/favicon.ico">

  <!-- PNG Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon/favicon-16x16.png">

  <!-- Apple -->
  <link rel="apple-touch-icon" sizes="180x180" href="src/favicon/apple-touch-icon.png">

  <!-- Android -->
  <link rel="icon" type="image/png" sizes="192x192" href="src/favicon/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="src/favicon/android-chrome-512x512.png">

  <!-- Manifest -->
  <link rel="manifest" href="src/favicon/site.webmanifest">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ---------- Navbar ---------- -->
  <nav class="navbar">
    <div class="nav-left">
      <img src="/src/images/logo_no_background.png" alt="Highlander Duelists Logo">
      <span class="club-name">Highlander Duelists</span>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="/src/pages/events.html">Events</a>
      <a href="/src/pages/starter.html">Starter Decks</a>
      <!-- <a href="/src/pages/officers.html">Officers</a> -->
      <a href="/src/pages/photos.html">Photos</a>
      <div class="nav-socials">
        <a href="https://www.instagram.com/highlanderduelist/" target="_blank">
          <img src="src/images/instagram.png" alt="Instagram">
        </a>
        <a href="https://www.youtube.com/@highlanderduelists7081" target="_blank">
          <img src="src/images/youtube.png" alt="YouTube">
        </a>
      </div>
    </div>
  </nav>


  <!-- ---------- Home ---------- -->
  <section id="home" class="hero">
    <img src="src/images/logo_no_background.png" alt="Highlander Duelists Logo" />
    <h1>Highlander Duelists</h1>
    <p>UC Riverside Yu-Gi-Oh! Club for duelists of all skill levels.</p>
  </section>


  <!-- ---------- Sponsors ---------- -->
  <section class="sponsors">
    <h2>Our Sponsors</h2>

    <div class="sponsor-logos">
      <!-- Sponsor Logo will be dynamically added -->
    </div>
  </section>


  <!-- ---------- Footer ---------- -->
  <footer>
    © 2026 Highlander Duelists · UC Riverside
  </footer>

  <!-- ---------- JavaScript ---------- -->
<script>
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Ef1HHwBQzNZphduXCvUmSsROT782u705j0JJIPdlMQ0/export?format=csv";

  // Target the inner logos container, not the whole section
  const logoContainer = document.querySelector(".sponsor-logos");

  fetch(SHEET_URL)
    .then(response => {
      if (!response.ok) throw new Error("HTTP " + response.status);
      return response.text();
    })
    .then(csv => {
      const rows = csv.split("\n").slice(1); // skip header

      rows.forEach(row => {
        if (!row.trim()) return;

        // Safer CSV split that handles quoted fields
        const cols = [...row.matchAll(/("([^"]*)"|([^,]+))/g)].map(m => m[2] ?? m[3] ?? "");
        const [Title, WebPage, Logo] = cols;

        const a = document.createElement("a");
        a.href = WebPage?.trim() || "#";
        a.target = "_blank";

        const img = document.createElement("img");
        img.src = Logo?.trim() || "";
        img.alt = Title?.trim() || "Sponsor";

        a.appendChild(img);
        logoContainer.appendChild(a);
      });
    })
    .catch(err => {
      console.error("Failed to load sheet", err);
    });
</script>


</body>
</html>
